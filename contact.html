<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katharina Burger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background-color: #1a1a1a;
            color: #dddddd;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: #cccccc;
            text-decoration: none;
            border-bottom: 1px dotted #555;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        a:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }
        .container {
            max-width: 1200px;  /* Same as Home page */
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }
        
        .contact-content {
            max-width: 800px;
            margin: 60px auto;
        }

        /* HEADER */
        header {
            border-bottom: 1px solid #333;
            padding: 20px 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
            align-items: baseline;
        }

        nav ul li:first-child {
            margin-right: auto;
        }

        nav ul li:first-child a {
            color: #ffffff;
            font-size: 1.4em;
            font-weight: 300;
            letter-spacing: 1px;
            border-bottom: none;
            text-transform: uppercase;
        }

        nav ul li:not(:first-child) a {
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
            border-bottom: 1px solid transparent;
        }

        nav ul li:not(:first-child) a:hover {
            border-bottom-color: #aaa;
        }

        /* CONTENT */
        

        h1 {
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 2.2em;
        }

        p {
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .contact-method {
            margin-bottom: 40px;
            padding: 20px;
            background-color: #252525;
            border: 1px solid #333;
            border-radius: 4px;
        }

        .contact-method h2 {
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .contact-method a {
            font-size: 1.2em;
            word-break: break-word;
        }

        /* Simple contact form (optional) */
        .contact-form {
            margin-top: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cccccc;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: #252525;
            border: 1px solid #444;
            color: #ffffff;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.2s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #777;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        button {
            background-color: transparent;
            color: #cccccc;
            border: 1px solid #555;
            padding: 12px 30px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #333;
            color: #ffffff;
            border-color: #777;
        }

        .note {
            font-size: 0.85em;
            color: #888;
            margin-top: 15px;
            text-align: center;
        }

        /* FOOTER */
        footer {
            margin-top: auto;
            padding: 30px 0;
            border-top: 1px solid #333;
            text-align: center;
            font-size: 0.8em;
            color: #777;
        }

        .social-links {
            margin-top: 10px;
        }

        .social-links a {
            margin: 0 10px;
            border-bottom: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>

            </div>

            </div>

            <p style="margin-top: 40px;"><a href="index.html" style="border-bottom: none;">← Back to images</a></p>

    <footer>
        <div class="container">
            <p>&copy; 2026 Katharina Burger</p>
            <div class="social-links">
                <a href="https://instagram.com/komposition10" target="_blank">Instagram</a>
            </div>
        </div>

</html>
