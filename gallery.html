<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katharina Burger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background-color: #1a1a1a;
            color: #dddddd;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: #cccccc;
            text-decoration: none;
            border-bottom: 1px dotted #555;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        a:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        /* HEADER */
        header {
            border-bottom: 1px solid #333;
            padding: 20px 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
            align-items: baseline;
        }

        nav ul li:first-child {
            margin-right: auto;
        }

        nav ul li:first-child a {
            color: #ffffff;
            font-size: 1.4em;
            font-weight: 300;
            letter-spacing: 1px;
            border-bottom: none;
            text-transform: uppercase;
        }

        nav ul li:not(:first-child) a {
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
            border-bottom: 1px solid transparent;
        }

        nav ul li:not(:first-child) a:hover {
            border-bottom-color: #aaa;
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            padding: 40px 0;
        }

        .gallery-frame {
            width: 100%;
            height: 800px;
            border: none;
            background-color: #1a1a1a;
        }

        /* FOOTER */
        footer {
            padding: 30px 0;
            border-top: 1px solid #333;
            text-align: center;
            font-size: 0.8em;
            color: #777;
        }

        .social-links {
            margin-top: 10px;
        }

        .social-links a {
            margin: 0 10px;
            border-bottom: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">Katharina Burger</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <p style="margin-bottom: 30px; color: #aaa; font-style: italic;">
        Impressions of surveying work and painting border stones
        </p>
        
        <iframe
            src="/personalwebsite/gallery/index.html" 
            class="gallery-frame"
            loading="lazy">
        </iframe>

        <div style="text-align: center; margin: 20px; padding: 10px; background: #252525;">
            <p>Direct link to gallery: 
                <a href="gallery/index.html" target="_blank" style="color: #fff;">click here</a>
            </p>
            <p>If the link works but iframe doesn't, it's an iframe issue.</p>
            <p>If the link doesn't work either, the path is wrong.</p>
        </div>
        
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Katharina Burger </p>
            <div class="social-links">
                <a href="https://instagram.com/komposition10" target="_blank">Instagram</a>
            </div>
        </div>
    </footer>
</body>
</html>
    </footer>
</body>
</html>
