name: Build Gallery

on:
  push:
    branches: [ main ]
    paths:
      - 'galleryimages/**'
      - '*.html'
      - 'config.json'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install thumbsup
      run: npm install -g thumbsup
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y exiftool graphicsmagick
    
    - name: Build gallery
      run: thumbsup --input ./galleryimages --output ./gallery-output --config ./config.json
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gallery-output
        destination_dir: gallery-content
