name: Build Gallery

on:
  push:
    branches: [ main ]
    paths:
      - 'galleryimages/**'
      - '*.html'
      - 'config.json'
  workflow_dispatch:

# Add this permissions block
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install thumbsup
      run: npm install -g thumbsup
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y exiftool graphicsmagick
    
    - name: Build gallery
      run: thumbsup --input ./galleryimages --output ./gallery-output --config ./config.json || true
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./gallery-output
        destination_dir: gallery-content
        keep_files: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        publish_branch: gh-pages  # Explicitly set the branch
