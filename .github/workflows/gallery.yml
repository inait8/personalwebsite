name: Build Gallery

on:
  push:
    branches: [ main ]
    paths:
      - 'galleryimages/**'
      - '*.html'
      - 'config.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install thumbsup
      run: npm install -g thumbsup
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y exiftool graphicsmagick
    
    - name: Build gallery
      run: thumbsup --input ./galleryimages --output ./gallery-output --config ./config.json
    
    - name: Copy all files to _site
      run: |
        mkdir -p ./_site
        cp -r gallery-output/* ./_site/gallery/ 2>/dev/null || true
        cp *.html ./_site/ 2>/dev/null || true
        cp -r images ./_site/ 2>/dev/null || true
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
