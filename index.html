<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography</title>
    <style>
        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background-color: #1a1a1a;  /* Dark background */
            color: #dddddd;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            color: #cccccc;
            text-decoration: none;
            border-bottom: 1px dotted #555;
            transition: color 0.2s ease;
        }

        a:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }

        /* --- Layout Container --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            width: 100%;
        }

        /* --- Header & Navigation (Simple) --- */
        header {
            padding: 30px 0 20px 0;
            border-bottom: 1px solid #333;
        }

        .site-title {
            font-size: 1.8em;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
        }
        .site-title a {
            border-bottom: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin-top: 15px;
        }

        nav ul li a {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid transparent;
        }

        nav ul li a:hover {
            border-bottom-color: #aaa;
        }

        /* --- MAIN FOCUS: Single Big Image --- */
        .main-image-section {
            flex: 1;  /* Takes up available space */
            display: flex;
            align-items: center;     /* Vertically center */
            justify-content: center; /* Horizontally center */
            padding: 40px 20px;
        }

        .image-container {
            position: relative;
            width: 100%;
            max-width: 1000px;  /* Limits how big it can get on very wide screens */
            margin: 0 auto;
            cursor: default;     /* Keeps normal cursor, not clickable */
        }

        /* The Image Itself - NO FRAME, NO BORDER */
        .main-image {
            display: block;
            width: 100%;
            height: auto;
            border: none;        /* Explicitly no border */
            outline: none;       /* No outline */
            box-shadow: none;    /* No shadow/frame */
        }

        /* Caption that appears ONLY on hover */
        .image-caption {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);  /* Semi-transparent black */
            color: #ffffff;
            padding: 8px 16px;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            border-radius: 3px;    /* Slightly rounded corners, optional */
            opacity: 0;             /* Hidden by default */
            transition: opacity 0.3s ease;
            pointer-events: none;   /* Caption doesn't block mouse */
        }

        /* Show caption when hovering over the image container */
        .image-container:hover .image-caption {
            opacity: 1;
        }

        /* --- Footer --- */
        footer {
            padding: 30px 0;
            border-top: 1px solid #333;
            text-align: center;
            font-size: 0.8em;
            color: #777;
        }

        /* Simple navigation for different images */
        .image-nav {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
        }

        .image-nav a {
            margin: 0 15px;
            border-bottom: none;
        }

        .image-nav a:hover {
            border-bottom: 1px dotted #aaa;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1 class="site-title"><a href="index.html">Your Name</a></h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Archive</a></li>
                    <li><a href="#">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- This is the main section with the single big image -->
    <main class="main-image-section">
        <div class="container">
            <div class="image-container">
                <!-- REPLACE THIS with your own image file name -->
                <img src="your-photo.jpg" alt="Photography" class="main-image">
                
                <!-- This text appears ONLY when you hover over the image -->
                <div class="image-caption">Title or Location, 2026</div>
            </div>

            <!-- Optional: Simple navigation for multiple images -->
            <div class="image-nav">
                <a href="#">← Previous</a>
                <a href="#">Index</a>
                <a href="#">Next →</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Your Name | <a href="#">Contact</a></p>
        </div>
    </footer>
</body>
</html>
